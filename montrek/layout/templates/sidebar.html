<nav class="sidebar-nav">
  <ul class="list-unstyled mb-0" id="sideNavAccordion">
    {% for group, links in grouped_items.items %}
    {% with group_slug=group|slugify %}
    <li class="sidebar-group">
      <button
        class="sidebar-group-toggle d-flex justify-content-between align-items-center w-100 text-start"
        data-bs-toggle="collapse"
        data-bs-target="#group-{{ group_slug }}"
        aria-expanded="{% if group == active_group %}true{% else %}false{% endif %}"
        aria-controls="group-{{ group_slug }}"
        type="button"
      >
        <span>{{ group }}</span>
        <span class="bi bi-chevron-down collapsible-chevron"></span>
      </button>

      <ul
        class="collapse list-unstyled sidebar-links {% if group == active_group %}show{% endif %}"
        id="group-{{ group_slug }}"
      >
        {% for link in links %}
        <li class="link-list {{ link.td_classes_str }}">{{ link.display_value }}</li>
        {% endfor %}
      </ul>
    </li>
    {% endwith %}
    {% endfor %}
  </ul>
</nav>
