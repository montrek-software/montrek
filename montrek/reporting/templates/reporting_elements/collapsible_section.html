<div class="mb-2">
  <button class="btn btn-light-custom btn-sm w-100 text-start d-flex justify-content-between align-items-center"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#{{ collapse_id }}"
          aria-expanded="{% if show %}true{% else %}false{% endif %}"
          aria-controls="{{ collapse_id }}">
    <span>{{ header }}</span>
    <span class="bi bi-chevron-down collapsible-chevron"></span>
  </button>
  <div class="collapse{% if show %} show{% endif %}" id="{{ collapse_id }}">
    {{ content | safe }}
  </div>
</div>
