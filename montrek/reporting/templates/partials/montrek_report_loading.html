<div
  id="report-content"
  hx-get="{{ request.get_full_path }}"
  hx-vals='{"state":"loading"}'
  hx-trigger="load"
  hx-target="#report-content"
>
  <div class="loader-container">
    <output aria-live="polite" class="visually-hidden">Loading...</output>
    <div class="skeleton-table" aria-hidden="true">
      <div class="skeleton-row skeleton-row-header">
        {% for _ in "12345" %}<span class="skeleton-cell"></span>{% endfor %}
      </div>
      {% for _ in "1234" %}
        <div class="skeleton-row">
          {% for _ in "12345" %}<span class="skeleton-cell"></span>{% endfor %}
        </div>
      {% endfor %}
    </div>
    <p class="loader-text">Processing data…</p>
  </div>
</div>
