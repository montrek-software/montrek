{% load colors %}
<style>
  /* =========================================================
     STRUCTURAL BASE LAYER
     Colors, typography and component theming live in
     gold_theme.html (loaded after this file).
     ========================================================== */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  html {
    font-size: 80%; /* scales the whole UI down */
  }

  label {
    font-weight: bold;
  }

  p {
    margin-top: 15px;
    margin-bottom: 10px;
  }

  li {
    margin-left: 20px;
  }

  textarea.resizable {
    resize: both;
  }

  .bg-primary-light-custom {
    background-color: {% get_color "primary_light" %}
  }

/* =========================================================
   TILES
  ========================================================== */

  .tile {
    position: relative;       /* allows absolute positioning inside */
    margin-bottom: 20px;
  }

/* =========================================================
   NAVBAR
   ========================================================= */

  .navbar-brand {
    font-weight: bold;
  }

  .page-link.custom {
    background-color: #ffffff;
    padding: 0.25rem 0.6rem;
  }

  .page-item.disabled .page-link.custom {
    background-color: #e9ecef;
    color: #6c757d;
    cursor: not-allowed;
  }

/* Navbar-Text (logged in as …) */
  .navbar-custom .navbar-text {
    display: flex;
    align-items: center;
    padding: 0 1rem;
    height: 100%;
  }

/* =========================================================
   BUTTONS
   ========================================================= */

/* Chevron icon inside collapsible section toggle */
  .collapsible-chevron {
    flex-shrink: 0;
    transition: transform 0.2s ease;
  }

  [aria-expanded="true"] .collapsible-chevron {
    transform: rotate(180deg);
  }

/* Buttons im Tabellen-Kontext */
  .btn-order-field {
    background: none;
    border: none;
    padding: 0;
    font: inherit;
    width: 100%;
  }

/* Header cell layout: name + sort icon; alignment follows th class */
  .th-flex {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.25rem;
  }

  th.text-end .th-flex {
    justify-content: flex-end;
  }

  th.text-center .th-flex {
    justify-content: center;
  }

  .form-check-input {
    border: 2px solid {% get_color "secondary" %};
  }

  .form-check-input:checked {
    background-color: {% get_color "secondary" %};
    border-color: {% get_color "secondary" %};
  }

  .form-check-input:focus {
    box-shadow: 0 0 0 0.25rem rgba(0,0,0,0.1);
  }

/* =========================================================
   TABLES
   ========================================================= */

/* Table-Header (structural; colors come from gold_theme) */
  .table-custom-striped.table thead th {
    text-align: left;
    position: sticky;
    top: 0;
    z-index: 5;
  }

/* Cells */
  td {
    padding: 2px;
  }

/* =========================================================
   LISTEN-HIGHLIGHTS
   ========================================================= */
  .highlight-list,
  .lowlight-list {
    list-style: none;
    padding: 0;
  }

  .highlight-list li,
  .lowlight-list li {
    padding: 4px 6px;
    margin: 5px 0;
    border-radius: 5px;
    display: flex;
  }

  .highlight-list li::before {
    content: ">";
    font-weight: bold;
    color: {% get_color "primary" %};
    margin-right: 10px;
  }

  .lowlight-list li::before {
    content: ">";
    font-weight: bold;
    color: {% get_color "secondary" %};
    margin-right: 10px;
  }

  .link-list a {
    text-decoration: none;
    display: block;
  }

/* =========================================================
   SIDEBAR (structural; colors come from gold_theme)
   ========================================================= */
  .sidebar-nav li {
    margin-left: 0;
  }

  .sidebar-nav .sidebar-group-toggle {
    background: none;
    border: none;
    font: inherit;
  }

/* =========================================================
   INPUTS
   ========================================================= */
  input[readonly] {
    background-color: #e0e0e0;
    color: #333;
    cursor: not-allowed;
  }

  .input-custom {
    width: 100px;
  }

/* =========================================================
   PROGRESS BAR
   ========================================================= */
  .bar-container {
    position: relative;
    width: 100%;
    background-color: #f0f0f0;
    display: flex;
    align-items: center;
  }

  .bar {
    position: absolute;
    height: 90%;
    background-color: #388e3c;
  }

  .bar-value {
    position: relative;
    z-index: 1;
    width: 100%;
    text-align: center;
    color: black;
    border: 1px solid {% get_color "primary" %};
    font-weight: bold;
  }

/* =========================================================
   SCROLLABLE CONTENT
   ========================================================= */
  .scrollable-content {
    max-height: 100vh;
    overflow-y: auto;
  }

  .scrollable-600 {
    overflow-y: auto;
    max-height: 600px;
  }

/* =========================================================
   FOOTER (structural; colors come from gold_theme)
   ========================================================= */
  .footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    z-index: 1030;
  }
</style>
