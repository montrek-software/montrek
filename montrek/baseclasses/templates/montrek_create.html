{% extends 'base.html' %}
{% block content %}
{% include 'includes/_admin_widgets.html' %}
<div class="container-fluid">
  <div class="tile p-4">
    <h2 id="id_title" class="mb-4">{{ tag }}</h2>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {% include 'includes/_form_fields.html' %}
      <div class="row mt-4">
        <div class="col-sm-9 offset-sm-3 col-lg-10 offset-lg-2">
          <button type="submit" class="btn btn-custom" id="id_submit">{{ tag }}</button>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
